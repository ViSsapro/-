<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>𝐓𝐡𝐮𝐡𝐢 𝐎ꜰᴄ 𝐌ɪɴɪ</title>
  <style>
    body { background: Black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
    .box { width: 330px; padding: 20px; background: #111; border-radius: 10px; box-shadow: 0 0 15px #00f2ff; text-align: center; }
    input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
    button { padding: 10px; background: #00bfff; border: none; color: white; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h3>THUHI MD PAIRING</h3>
    <input type="number" id="number" placeholder="9477xxxxxxx">
    <button id="submit">Get Code</button>
    <div id="pair" style="margin-top:20px;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script>
    document.getElementById("submit").addEventListener("click", async () => {
      const num = document.getElementById("number").value;
      const pairDiv = document.getElementById("pair");
      pairDiv.innerHTML = "Please wait...";
      try {
        const { data } = await axios.get(`/code?number=${num}`);
        pairDiv.innerHTML = `<h3>Your Code:</h3><h2 style="color:red">${data.code}</h2><p>Copy this and paste in WhatsApp Linked Devices</p>`;
      } catch (e) {
        pairDiv.innerHTML = "Error: Could not get code. Ensure server is running.";
      }
    });
  </script>
</body>
</html>
