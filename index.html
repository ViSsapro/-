<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thuhi Md</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
  <style>
    body{display:flex;justify-content:center;align-items:center;height:100vh;margin:0;background:Black;font-family:Arial,sans-serif;overflow:hidden}
   .container{display:flex;flex-direction:column;align-items:center;z-index:2}
   .box{width:330px;padding:20px;background-color:Black;border-radius:10px;text-align:center;box-shadow:0 0 25px #00f2ff;z-index:2}
    @keyframes flicker{0%,100%{opacity:1}50%{opacity:0.6;text-shadow:0 0 5px #0ff,0 0 20px #0ff}}
    h3,h6{color:#00f2ff;animation:flicker 2s infinite alternate;margin:10px 0}
   .input-container{display:flex;width:100%;margin-top:16px}
   .input-container input,.input-container button{height:3rem;font-size:1rem;border:none;outline:none;box-sizing:border-box}
   .input-container input{width:70%;border-radius:0.8rem 0 0 0.8rem;background:#e0f7ff;color:#000;padding-left:1rem}
   .input-container button{width:30%;border-radius:0 0.8rem 0.8rem 0;background:#00bfff;color:#fff;font-weight:bold;cursor:pointer}
   .input-container button:hover{background:#00ffff;color:#000}
   .centered-text{color:white;display:block;margin-top:20px;font-weight:bold}
   .Neon-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:black;overflow:hidden;z-index:1}
   .dot{position:absolute;width:8px;height:8px;background:#00ffff;border-radius:50%;animation:rise 5s linear infinite;opacity:0.6}
    @keyframes rise{0%{transform:translateY(100vh) scale(0.5);opacity:0.2}100%{transform:translateY(-10vh) scale(1);opacity:1}}
  </style>
</head>
<body>
  <div class="Neon-bg" id="dots"></div>
  <div class="container">
    <div class="box">
      <div>
        <i class="fa fa-user" style="color:#00ffff;"></i>
        <h3>Thuhi Md</h3>
        <h6>POWERED BY VIMUKTHI THUHINA</h6>
        <h6>🔢 Enter: 9477xxxxxxx</h6>
        <div class="input-container">
          <input placeholder="9477xxxxxxx" type="tel" id="number">
          <button id="submit">Submit</button>
        </div>
        <div id="pair" class="centered-text"></div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.0/axios.min.js"></script>
  <script>
    let pairDiv = document.getElementById("pair");
    let submitBtn = document.getElementById("submit");
    let numberInput = document.getElementById("number");

    async function CopyCode() {
      let codeText = document.getElementById("codeText").innerText;
      await navigator.clipboard.writeText(codeText);
      document.getElementById("copyBtn").innerText = "COPIED ✓";
      setTimeout(() => document.getElementById("copyBtn").innerText = "COPY CODE", 2000);
    }

    submitBtn.addEventListener("click", async (e) => {
      e.preventDefault();
      let num = numberInput.value.replace(/[^0-9]/g, "");

      if (!num) return pairDiv.innerHTML = '<span style="color:yellow;">Number එක දාපන්</span>';
      if (!num.startsWith('94') || num.length < 11) return pairDiv.innerHTML = '<span style="color:red;">94 වලින් පටන් ගන්න</span>';

      pairDiv.innerHTML = '<span style="color:white;">Please Wait...</span>';
      submitBtn.disabled = true;

      try {
        // POST method එකට මාරු කරා - 405 error fix
        let res = await axios.post('/code', { number: num });
        let data = res.data;

        if(data.code) {
          pairDiv.innerHTML = `
            <span style="color:#00ff00;font-size:18px;">Pairing Code:</span><br><br>
            <div id="codeText" style="color:white;font-size:28px;font-weight:bold;letter-spacing:5px;">${data.code}</div><br>
            <button id="copyBtn" onclick="CopyCode()" style="padding:10px 20px;background:#00bfff;border:none;border-radius:8px;color:white;font-weight:bold;cursor:pointer;">COPY CODE</button><br><br>
            <span style="font-size:12px;color:gray;">WhatsApp → Settings → Linked Devices → Link with phone number</span>
          `;
        } else {
          pairDiv.innerHTML = `<span style="color:red;">${data.error}</span>`;
        }
      } catch(err) {
        let msg = err.response?.data?.error || 'Server error. Refresh කරපන්';
        pairDiv.innerHTML = `<span style="color:red;">Error: ${msg}</span>`;
        console.log(err);
      } finally {
        submitBtn.disabled = false;
      }
    });

    const bg = document.getElementById("dots");
    for (let i = 0; i < 80; i++) {
      const dot = document.createElement("div");
      dot.classList.add("dot");
      dot.style.left = Math.random() * 100 + "vw";
      dot.style.top = Math.random() * 100 + "vh";
      dot.style.animationDuration = 3 + Math.random() * 5 + "s";
      dot.style.animationDelay = Math.random() * 5 + "s";
      bg.appendChild(dot);
    }
  </script>
</body>
    </html>
